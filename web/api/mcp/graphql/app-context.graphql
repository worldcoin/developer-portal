query McpAppContext($team_id: String!, $app_id: String!) {
  app(
    where: {
      id: { _eq: $app_id }
      team_id: { _eq: $team_id }
      deleted_at: { _is_null: true }
    }
    limit: 1
  ) {
    id
    name
    engine
    is_staging
    status
    app_metadata(
      where: { verification_status: { _neq: "verified" } }
      order_by: { created_at: desc }
      limit: 1
    ) {
      id
      name
      short_name
      app_mode
      category
      content_card_image_url
      description
      hero_image_url
      integration_url
      is_android_only
      app_website_url
      is_for_humans_only
      logo_img_url
      meta_tag_image_url
      support_link
      showcase_img_urls
      world_app_description
      world_app_button_text
      verification_status
      is_developer_allow_listing
      supported_countries
      supported_languages
    }
    verified_app_metadata: app_metadata(
      where: { verification_status: { _eq: "verified" } }
      order_by: { verified_at: desc }
      limit: 1
    ) {
      id
      name
      short_name
      app_mode
      category
      content_card_image_url
      description
      hero_image_url
      integration_url
      is_android_only
      app_website_url
      is_for_humans_only
      logo_img_url
      meta_tag_image_url
      support_link
      showcase_img_urls
      world_app_description
      world_app_button_text
      verification_status
      is_developer_allow_listing
      supported_countries
      supported_languages
      source_code_url
      whitelisted_addresses
      associated_domains
      contracts
      permit2_tokens
      can_import_all_contacts
      can_use_attestation
      is_allowed_unlimited_notifications
      max_notifications_per_day
    }
    rp_registration {
      rp_id
      mode
      status
      signer_address
      staging_status
      actions_v4(order_by: { created_at: desc }) {
        id
        action
        description
        environment
      }
    }
  }
}
