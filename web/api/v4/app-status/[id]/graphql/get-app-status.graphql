query GetAppStatusByAppId($app_id: String!) {
  app_by_pk(id: $app_id) {
    verified_app_metadata: app_metadata(
      where: { verification_status: { _eq: "verified" } }
      limit: 1
    ) {
      id
    }
  }
}

query GetAppStatusByRpId($rp_id: String!) {
  rp_registration(where: { rp_id: { _eq: $rp_id } }, limit: 1) {
    app {
      verified_app_metadata: app_metadata(
        where: { verification_status: { _eq: "verified" } }
        limit: 1
      ) {
        id
      }
    }
  }
}
