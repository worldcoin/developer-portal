query GetRpRegistration($app_id: String!) {
  rp_registration(where: { app_id: { _eq: $app_id } }) {
    rp_id
    app_id
    mode
    status
    signer_address
    manager_kms_key_id
    operation_hash
    updated_at
    app {
      team_id
      deleted_at
      status
      is_archived
    }
  }
}
