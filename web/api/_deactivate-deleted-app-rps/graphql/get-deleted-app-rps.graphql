query GetDeletedAppRps($before: timestamptz!, $limit: Int!) {
  rp_registration(
    where: {
      mode: { _eq: managed }
      status: { _neq: deactivated }
      updated_at: { _lt: $before }
      app: { deleted_at: { _is_null: false } }
    }
    order_by: { updated_at: asc }
    limit: $limit
  ) {
    rp_id
    app_id
    status
  }
}
