# One nullifier row is one unique verification for its action.
query GetWorldIdOverview(
  $app_id: String!
  $d0: timestamptz!
  $d1: timestamptz!
  $d2: timestamptz!
  $d3: timestamptz!
  $d4: timestamptz!
  $d5: timestamptz!
  $d6: timestamptz!
  $d7: timestamptz!
) {
  app(where: { id: { _eq: $app_id } }) {
    id
    is_banned
    is_staging
    app_metadata {
      name
    }
    rp_registration {
      rp_id
      app_id
      status
      staging_status
      mode
      signer_address
      created_at
    }
  }

  action_v4(
    where: {
      environment: { _eq: "production" }
      rp_registration: { app: { id: { _eq: $app_id } } }
    }
    order_by: { created_at: desc }
  ) {
    id
    action
    description
    created_at
    total: nullifiers_aggregate {
      aggregate {
        count
      }
    }
    latest: nullifiers_aggregate {
      aggregate {
        max {
          created_at
        }
      }
    }
    ...WorldIdActionTrendBuckets
  }

  # Show the legacy tab only when a non-sign-in v3 action exists.
  action(where: { app_id: { _eq: $app_id }, action: { _neq: "" } }, limit: 1) {
    id
  }
}
