# Split so the 5s feed poll does not refetch aggregates.
query GetActionVerificationsFeed(
  $action_id: String!
  $app_id: String!
  $limit: Int!
  $offset: Int!
) {
  action_v4(
    where: {
      id: { _eq: $action_id }
      environment: { _eq: "production" }
      rp_registration: { app_id: { _eq: $app_id } }
    }
    limit: 1
  ) {
    id
    action
    description
    rp_id
    created_at
    rp_registration {
      app_id
    }
    total: nullifiers_aggregate {
      aggregate {
        count
      }
    }
    # Stable tie-breaker for rows sharing a timestamp.
    nullifiers(
      limit: $limit
      offset: $offset
      order_by: [{ created_at: desc }, { id: desc }]
    ) {
      id
      created_at
      nullifier
    }
  }
}

query GetActionStats(
  $action_id: String!
  $app_id: String!
  $d0: timestamptz!
  $d1: timestamptz!
  $d2: timestamptz!
  $d3: timestamptz!
  $d4: timestamptz!
  $d5: timestamptz!
  $d6: timestamptz!
  $d7: timestamptz!
) {
  action_v4(
    where: {
      id: { _eq: $action_id }
      environment: { _eq: "production" }
      rp_registration: { app_id: { _eq: $app_id } }
    }
    limit: 1
  ) {
    id
    week: nullifiers_aggregate(where: { created_at: { _gte: $d0, _lt: $d7 } }) {
      aggregate {
        count
      }
    }
    ...WorldIdActionTrendBuckets
  }
}
