query FetchAdminUserTeams(
  $limit: Int!
  $offset: Int!
  $where: membership_bool_exp!
) {
  membership(
    limit: $limit
    offset: $offset
    order_by: [{ team: { name: asc } }, { id: asc }]
    where: $where
  ) {
    id
    role
    team_id
    team {
      id
      name
      deleted_at
    }
  }
  membership_aggregate(where: $where) {
    aggregate {
      count
    }
  }
}
