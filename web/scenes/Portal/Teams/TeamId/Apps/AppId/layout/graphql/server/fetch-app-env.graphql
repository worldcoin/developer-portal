query FetchAppEnv($id: String!) {
  app(where: { id: { _eq: $id } }) {
    id
    engine
    app_metadata(
      where: { verification_status: { _neq: "verified" } }
      limit: 1
    ) {
      app_mode
    }
    verified_app_metadata: app_metadata(
      where: { verification_status: { _eq: "verified" } }
      limit: 1
    ) {
      app_mode
    }
    rp_registration {
      rp_id
    }
  }
  # Exclude auto-created "Sign in with World ID" actions (action = "") as they have their own dedicated page
  action(where: { app_id: { _eq: $id }, action: { _neq: "" } }, limit: 1) {
    id
  }
}
