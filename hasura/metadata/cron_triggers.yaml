- name: Cleanup notification logs
  webhook: '{{NEXT_API_URL}}/delete-expired-notification-logs'
  schedule: '*/15 * * * *'
  include_in_metadata: true
  payload: {}
  retry_conf:
    num_retries: 1
    retry_interval_seconds: 10
    timeout_seconds: 60
    tolerance_seconds: 21600
  headers:
    - name: Authorization
      value_from_env: INTERNAL_ENDPOINTS_SECRET
  comment: Delete notification logs that are at least 4 weeks old. Also deletes the corresponding notification_log_wallet_addresses
- name: Delete expired auth codes
  webhook: '{{NEXT_API_URL}}/_delete-expired-auth-codes'
  schedule: 0 * * * *
  include_in_metadata: true
  payload: {}
  retry_conf:
    num_retries: 1
    retry_interval_seconds: 10
    timeout_seconds: 60
    tolerance_seconds: 21600
  headers:
    - name: Authorization
      value_from_env: INTERNAL_ENDPOINTS_SECRET
  comment: ""
- name: Delete expired jwks
  webhook: '{{NEXT_API_URL}}/_delete-jwks'
  schedule: 0 * * * *
  include_in_metadata: true
  payload: {}
  retry_conf:
    num_retries: 1
    retry_interval_seconds: 10
    timeout_seconds: 60
    tolerance_seconds: 21600
  headers:
    - name: Authorization
      value_from_env: INTERNAL_ENDPOINTS_SECRET
  comment: Schedules all expired JWKS for deletion by KMS
- name: Rollup app stats
  webhook: '{{NEXT_API_URL}}/_rollup-app-stats'
  schedule: '*/5 * * * *'
  include_in_metadata: true
  payload: {}
  retry_conf:
    num_retries: 5
    retry_interval_seconds: 10
    timeout_seconds: 60
    tolerance_seconds: 21600
  headers:
    - name: Authorization
      value_from_env: INTERNAL_ENDPOINTS_SECRET
  comment: Watermark-driven verification stats rollup (new read models + legacy app_stats compatibility)
- name: Reconcile verification stats
  webhook: '{{NEXT_API_URL}}/_reconcile-verification-stats'
  schedule: '45 3 * * *'
  include_in_metadata: true
  payload: {}
  retry_conf:
    num_retries: 1
    retry_interval_seconds: 60
    timeout_seconds: 120
    tolerance_seconds: 21600
  headers:
    - name: Authorization
      value_from_env: INTERNAL_ENDPOINTS_SECRET
  comment: Nightly bounded reconciliation of verification stats read models (cursor-resumable batches)
- name: Deactivate RPs for deleted apps
  webhook: '{{NEXT_API_URL}}/_deactivate-deleted-app-rps'
  schedule: '*/15 * * * *'
  include_in_metadata: true
  payload: {}
  retry_conf:
    num_retries: 1
    retry_interval_seconds: 10
    timeout_seconds: 120
    tolerance_seconds: 21600
  headers:
    - name: Authorization
      value_from_env: INTERNAL_ENDPOINTS_SECRET
  comment: Deactivate the managed RP signer on-chain for soft-deleted apps whose RP is still live (reconciles delete-time failures and backfills apps deleted before delete-time deactivation existed).
